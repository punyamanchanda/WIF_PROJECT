name: Deploy to GCS

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/501164918961/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: github-gcs-sync-892@cliprojectdemo.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - name: Deploy website to GCS
        run: |
          ls -larth
            gcloud storage cp ./index.html gs://punya-web-bucket-1234/my-website/index.html \
