<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Zee Security Team</title>
  <style>
    :root {
      --bg: #0b1017;
      --panel: #111a24;
      --panel-2: #182433;
      --text: #f4f7fb;
      --muted: #a8b3c2;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #3dd6c6;
      --accent-2: #f4bf50;
      --danger: #ff6f91;
      --logo: #9ca3af;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(61, 214, 198, 0.18), transparent 28rem),
        radial-gradient(circle at 82% 24%, rgba(244, 191, 80, 0.12), transparent 24rem),
        linear-gradient(135deg, #080c12 0%, var(--bg) 52%, #101823 100%);
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 72px;
      padding: 0 6vw;
      border-bottom: 1px solid var(--line);
      background: rgba(11, 16, 23, 0.82);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .logo {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      color: var(--logo);
      border: 2px solid rgba(156, 163, 175, 0.55);
      border-radius: 8px;
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
      background: rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.04);
    }

    .nav-status {
      color: var(--muted);
      font-size: 14px;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0 64px;
    }

    .hero {
      display: grid;
      gap: 18px;
      max-width: 820px;
      margin-bottom: 44px;
    }

    .eyebrow {
      width: fit-content;
      padding: 8px 12px;
      color: #081013;
      background: var(--accent);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 6vw, 76px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .intro {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .security-card {
      position: relative;
      height: 260px;
      border: 0;
      padding: 0;
      color: inherit;
      background: transparent;
      perspective: 1100px;
      cursor: pointer;
    }

    .security-card:focus-visible {
      outline: 3px solid var(--accent-2);
      outline-offset: 5px;
      border-radius: 10px;
    }

    .card-inner {
      position: relative;
      display: block;
      width: 100%;
      height: 100%;
      transition: transform 700ms cubic-bezier(0.2, 0.8, 0.2, 1);
      transform-style: preserve-3d;
    }

    .security-card:hover .card-inner,
    .security-card:focus-visible .card-inner,
    .security-card.is-flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      backface-visibility: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
    }

    .card-front {
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        var(--panel);
    }

    .card-front::after {
      content: "";
      position: absolute;
      right: -36px;
      bottom: -36px;
      width: 128px;
      height: 128px;
      border: 18px solid rgba(61, 214, 198, 0.13);
      border-radius: 50%;
    }

    .card-back {
      align-items: flex-start;
      justify-content: center;
      gap: 18px;
      background:
        linear-gradient(145deg, rgba(61, 214, 198, 0.17), rgba(244, 191, 80, 0.12)),
        var(--panel-2);
      transform: rotateY(180deg);
    }

    .card-number {
      color: var(--accent);
      font-size: 14px;
      font-weight: 800;
    }

    .card-title {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: 25px;
      line-height: 1.16;
      letter-spacing: 0;
      text-transform: capitalize;
    }

    .card-icon {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border-radius: 8px;
      color: #081013;
      background: var(--accent-2);
      font-size: 24px;
      font-weight: 900;
    }

    .card-message {
      margin: 0;
      font-size: 27px;
      line-height: 1.28;
      font-weight: 800;
    }

    .card-hint {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    @media (max-width: 900px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .navbar {
        padding: 0 16px;
      }

      .nav-status {
        display: none;
      }

      main {
        width: min(100% - 24px, 1180px);
        padding-top: 44px;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .security-card {
        height: 230px;
      }

      .card-message {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar" aria-label="Primary navigation">
    <div class="brand">
      <div class="logo" aria-label="Zee logo">Z</div>
      <span>Zee Security Team</span>
    </div>
    <div class="nav-status">Secure by design</div>
  </nav>

  <main>
    <section class="hero" aria-labelledby="page-title">
      <div class="eyebrow">Cybersecurity Crew</div>
      <h1 id="page-title">Welcome to Zee Security Team</h1>
      <p class="intro">
        Meet the teams defending apps, identities, data, networks, and the tiny details that keep a company resilient.
      </p>
    </section>

    <section class="cards" aria-label="Security team focus areas">
      <button class="security-card" type="button" aria-label="Flip Application and Cloud Security card">
        <span class="card-inner">
          <span class="card-face card-front">
            <span class="card-number">01</span>
            <span class="card-title">Application &amp; Cloud Security</span>
            <span class="card-icon">AC</span>
          </span>
          <span class="card-face card-back">
            <span class="card-message">Helping developers sleep better after every release.</span>
          </span>
        </span>
      </button>

      <button class="security-card" type="button" aria-label="Flip IAM and Content card">
        <span class="card-inner">
          <span class="card-face card-front">
            <span class="card-number">02</span>
            <span class="card-title">IAM &amp; Content</span>
            <span class="card-icon">ID</span>
          </span>
          <span class="card-face card-back">
            <span class="card-message">🔑 You want access? Nice try.</span>
          </span>
        </span>
      </button>

      <button class="security-card" type="button" aria-label="Flip Privacy card">
        <span class="card-inner">
          <span class="card-face card-front">
            <span class="card-number">03</span>
            <span class="card-title">Privacy</span>
            <span class="card-icon">PR</span>
          </span>
          <span class="card-face card-back">
            <span class="card-message">🙈 We don't peek. We protect.</span>
          </span>
        </span>
      </button>

      <button class="security-card" type="button" aria-label="Flip Enterprise Security card">
        <span class="card-inner">
          <span class="card-face card-front">
            <span class="card-number">04</span>
            <span class="card-title">Enterprise Security</span>
            <span class="card-icon">ES</span>
          </span>
          <span class="card-face card-back">
            <span class="card-message">🛡️ Keeping the bad guys out and the good guys slightly inconvenienced.</span>
          </span>
        </span>
      </button>

      <button class="security-card" type="button" aria-label="Flip Network Security card">
        <span class="card-inner">
          <span class="card-face card-front">
            <span class="card-number">05</span>
            <span class="card-title">Network Security</span>
            <span class="card-icon">NS</span>
          </span>
          <span class="card-face card-back">
            <span class="card-message">If the Wi-Fi's working, thank us silently.</span>
          </span>
        </span>
      </button>

      <button class="security-card" type="button" aria-label="Flip GRC card">
        <span class="card-inner">
          <span class="card-face card-front">
            <span class="card-number">06</span>
            <span class="card-title">GRC</span>
            <span class="card-icon">GC</span>
          </span>
          <span class="card-face card-back">
            <span class="card-message">We're not saying 'No'... we're saying 'Have you read the policy?'</span>
          </span>
        </span>
      </button>
    </section>
  </main>

  <script>
    document.querySelectorAll(".security-card").forEach((card) => {
      card.addEventListener("click", () => {
        card.classList.toggle("is-flipped");
      });
    });
  </script>
</body>
</html>
